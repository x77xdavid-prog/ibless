<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 180" role="img" aria-label="진단 리포트 예시">
  <defs>
    <style>text{font-family:'Noto Sans KR','Malgun Gothic','Apple SD Gothic Neo',sans-serif;}</style>
  </defs>
  <rect width="320" height="180" rx="12" fill="#ffffff"/>
  <rect x="0.5" y="0.5" width="319" height="179" rx="12" fill="none" stroke="#ececec"/>
  <rect x="0" y="0" width="320" height="6" rx="3" fill="#ff7a00"/>
  <circle cx="24" cy="30" r="6" fill="#ff7a00"/>
  <text x="36" y="34" font-size="13" font-weight="700" fill="#151515">진단 리포트</text>
  <text x="36" y="48" font-size="8.5" fill="#8a8a8a">영역별 성취도 분석 · iBless Level Report</text>
  <rect x="262" y="18" width="44" height="17" rx="8.5" fill="#fff2e6" stroke="#ff7a00"/>
  <text x="284" y="30" text-anchor="middle" font-size="9" font-weight="700" fill="#b25b00">예시</text>

  <!-- bars -->
  <g>
    <text x="22" y="74" font-size="9.5" font-weight="700" fill="#494b4a">Listening</text>
    <rect x="104" y="66" width="194" height="10" rx="5" fill="#f0f0f0"/>
    <rect x="104" y="66" width="159" height="10" rx="5" fill="#ff7a00"/>

    <text x="22" y="100" font-size="9.5" font-weight="700" fill="#494b4a">Reading</text>
    <rect x="104" y="92" width="194" height="10" rx="5" fill="#f0f0f0"/>
    <rect x="104" y="92" width="143" height="10" rx="5" fill="#ff9d44"/>

    <text x="22" y="126" font-size="9.5" font-weight="700" fill="#494b4a">Speaking</text>
    <rect x="104" y="118" width="194" height="10" rx="5" fill="#f0f0f0"/>
    <rect x="104" y="118" width="126" height="10" rx="5" fill="#00b8e4"/>

    <text x="22" y="152" font-size="9.5" font-weight="700" fill="#494b4a">Writing</text>
    <rect x="104" y="144" width="194" height="10" rx="5" fill="#f0f0f0"/>
    <rect x="104" y="144" width="136" height="10" rx="5" fill="#feca0a"/>
  </g>

  <text x="22" y="172" font-size="8" fill="#9a9a9a">* 표시 수치는 예시이며 실제 진단 결과로 대체됩니다.</text>
</svg>
